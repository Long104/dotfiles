##############################
### WINDOWS AND WORKSPACES ###
##############################
#
windowrulev2 = workspace 3, class:^([Vv]esktop)$
windowrulev2 = workspace 5, class:^([Ss]potify)$
windowrulev2 = workspace 4, class:^([Ps]ostman)$
windowrulev2 = float, class:^([Rr]ofi)$
windowrulev2 = workspace 2, class:^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|Firefox)(.*)$
windowrule = center,^(pavucontrol|org.pulseaudio.pavucontrol)$
# Alacritty
windowrulev2 = float,class:^(Alacritty)$,title:^(Alacritty)$ windowrulev2 = noborder,class:^(Alacritty)$,title:^(Alacritty)$
windowrulev2 = size 1400 900,class:^(Alacritty)$,title:^(Alacritty)$
windowrulev2 = center,class:^(Alacritty)$,title:^(Alacritty)$

# pavucontrol
windowrule = float, pavucontrol

# Nautilus
windowrule = float,Nautilus
windowrule = noborder,Nautilus

# Neovide
windowrule = float, neovide
windowrule = size 1200 800, neovide
windowrule = noborder, neovide

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.


layerrule = ignorezero, overview
layerrule = blur, overview

windowrulev2=opacity 1 1,title:^(Picture-in-Picture)$ # for opacity: [focus num] [bg num]
# Interestingly, the opacity rule above doesn't need the reduplication?
windowrulev2=pin,title:^(Picture-in-Picture)$ 
#windowrulev2=pin,title:^(Firefox)$ 
windowrulev2=float, title:^(Picture-in-Picture)$
#windowrulev2=float, title:^(Firefox)$
windowrulev2=size 50% 50%,title:^(Picture-in-Picture)$ 
# windowrulev2=size 25% 25%,title:^(Picture-in-Picture)$ 
#windowrulev2=size 25% 25%,title:^(Firefox)$ 
windowrulev2=move 49% 10%,title:^(Picture-in-Picture)$ 
# windowrulev2=move 72% 7%,title:^(Picture-in-Picture)$ 
#windowrulev2=move 72% 7%,title:^(Firefox)$ 
